<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#05060a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>CAMFUN — AR Playground</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>">
  <link rel="stylesheet" href="/style.css">
  <script type="importmap">
    { "imports": { "three": "/vendor/three/three.module.js" } }
  </script>
</head>
<body>

  <!-- ======== AUTH SCREEN ======== -->
  <div id="auth" class="screen hidden">
    <div class="auth-card">
      <div class="logo">
        <span class="logo-icon">🌀</span>
        <h1>CAMFUN</h1>
        <p class="tagline">Point your phone at the world.<br>Weird things happen.</p>
      </div>
      <form id="auth-form" autocomplete="on">
        <input id="auth-username" type="text" placeholder="username" autocomplete="username"
               autocapitalize="none" spellcheck="false" maxlength="20" required>
        <input id="auth-password" type="password" placeholder="password" autocomplete="current-password" required>
        <div id="auth-error" class="auth-error hidden"></div>
        <button type="submit" class="btn-primary" id="auth-submit">Sign in</button>
      </form>
      <p class="auth-toggle">
        <span id="auth-toggle-text">New here?</span>
        <a href="#" id="auth-toggle-link">Create an account</a>
      </p>
    </div>
  </div>

  <!-- ======== HUB ======== -->
  <div id="hub" class="screen hidden">
    <header class="hub-header">
      <div class="logo-row"><span class="logo-icon small">🌀</span><span class="hub-title">CAMFUN</span></div>
      <div class="hub-user">
        <span id="hub-username"></span>
        <button id="logout-btn" class="btn-ghost">sign out</button>
      </div>
    </header>
    <p class="hub-sub">Pick an experience, then look around your room. Everything runs through your camera — nothing is recorded or uploaded.</p>
    <div id="mode-grid" class="mode-grid"></div>
    <footer class="hub-foot">works best on a phone · camera + motion permissions required</footer>
  </div>

  <!-- ======== AR STAGE ======== -->
  <div id="stage" class="screen hidden">
    <div id="gl-container"></div>
    <div id="hud"></div>

    <div id="intro" class="intro hidden">
      <div class="intro-card">
        <div id="intro-icon" class="intro-icon"></div>
        <h2 id="intro-title"></h2>
        <p id="intro-desc"></p>
        <button id="intro-start" class="btn-primary">Tap to begin</button>
        <p class="intro-perms" id="intro-perms"></p>
      </div>
    </div>
  </div>

  <!-- ======== LEADERBOARD MODAL ======== -->
  <div id="modal" class="modal hidden">
    <div class="modal-card">
      <h3 id="modal-title">Leaderboard</h3>
      <div id="modal-body"></div>
      <button id="modal-close" class="btn-primary">Close</button>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
